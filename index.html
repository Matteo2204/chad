*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--dk:#1a1a2e;--ac:#e94560;--bl:#0f3460;--gn:#2e7d32;--or:#e65100;--bg:#f5f5f7;--cd:#fff;--bd:#e8e8ed;--tx:#1d1d1f;--t2:#86868b;--ok:#34c759}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:var(--bg);color:var(--tx);max-width:500px;margin:0 auto;min-height:100dvh;-webkit-font-smoothing:antialiased;padding-bottom:70px}
.hd{background:var(--dk);padding:max(48px,calc(env(safe-area-inset-top)+10px)) 20px 16px;color:#fff}
.hd h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
.hd p{font-size:11px;color:#8e8ea0;margin-top:3px}
.hd .badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:6px}
.hd .badge.wk{background:var(--ac);color:#fff}
.hd .badge.kcal{background:var(--bl);color:#fff;margin-left:6px}
.tabs{display:flex;background:var(--cd);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100}
.tab{flex:1;text-align:center;padding:8px 0 6px;cursor:pointer;border-bottom:3px solid transparent;user-select:none}
.tab.on{border-bottom-color:var(--dk)}
.tab .ti{font-size:17px}
.tab .tl{font-size:9px;margin-top:1px;color:var(--t2);font-weight:500}
.tab.on .tl{color:var(--dk);font-weight:700}
.ct{padding:14px 16px;display:none}.ct.vis{display:block}
.card{background:var(--cd);border-radius:14px;padding:14px 16px;margin-bottom:10px;border:1px solid var(--bd)}
.btn{width:100%;padding:11px;border-radius:10px;border:none;background:var(--dk);color:#fff;font-weight:700;font-size:13px;cursor:pointer;margin-top:6px;transition:transform .1s}
.btn:active{transform:scale(.98)}
.btn.sec{background:transparent;color:var(--dk);border:2px solid var(--dk)}
.btn.ok{background:var(--ok)}
.btn.or{background:var(--or)}
.btn.sm{padding:8px 14px;width:auto;font-size:12px;margin:0}
.tog{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.tog.on{background:#fff3e0;border-color:var(--or)}
.sw{width:50px;height:26px;border-radius:13px;background:#d1d1d6;position:relative;transition:background .2s;flex-shrink:0}
.sw.on{background:var(--or)}
.sw-k{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.sw.on .sw-k{left:27px}
.pbar{height:6px;border-radius:3px;background:#eee;overflow:hidden;margin-top:8px}
.pfill{height:100%;border-radius:3px;background:var(--dk);transition:width .3s}
.pfill.dn{background:var(--ok)}

.ml.lg{border:2px solid var(--ok);background:#f0faf0}
.ml-h{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;user-select:none}
.ml-n{font-weight:700;font-size:14px}
.ml-m{font-size:11px;color:var(--t2);margin-top:1px}
.ml-ck{color:var(--ok);font-weight:700;font-size:13px;display:none}
.ml.lg .ml-ck{display:inline}
.ml-ar{font-size:11px;color:#ccc;transition:transform .2s;display:inline-block}
.ml.op .ml-ar{transform:rotate(180deg)}
.ml-b{padding:0 16px 14px;display:none}
.ml.op .ml-b{display:block}
.fm{background:#e3f2fd;border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:12px;font-weight:600;color:var(--bl);line-height:1.5}
.cn{font-weight:700;font-size:12px;color:#444;margin:10px 0 4px}

.fi{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:8px;margin:3px 0;cursor:pointer;user-select:none;transition:all .15s;border:1px solid transparent}
.fi:hover,.fi:active{background:#f8f8fa}
.fi.sel{background:#e8f5e9;border-color:var(--ok)}
.fi-n{font-size:12px;line-height:1.3;color:#333;flex:1}
.fi-q{font-size:11px;font-weight:700;color:var(--bl);min-width:70px;text-align:right}
.fi-q.sp{color:var(--or)}

.fi.sel .fi-ck{background:var(--ok);border-color:var(--ok)}

.ex-n{font-weight:700;font-size:13px;color:var(--dk)}
.ex-d{font-size:11px;color:var(--t2);line-height:1.5;margin-top:2px}
.ex-t{font-size:13px;font-weight:700;color:var(--bl);margin-top:4px}

.ex-log span{font-size:11px;color:var(--t2);align-self:center}
.phase-badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.phase-badge.p1{background:#e3f2fd;color:var(--bl)}
.phase-badge.p2{background:#fff3e0;color:var(--or)}
.phase-badge.p3{background:#fce4ec;color:var(--ac)}
.progress-hint{font-size:11px;color:var(--or);margin-top:4px;font-weight:600}
/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center}
.cal-hd{font-size:10px;font-weight:600;color:var(--t2);padding:4px 0}
.cal-d{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent}
.cal-d.today{border-color:var(--dk);background:#f0f0f5}
.cal-d.empty{opacity:0;pointer-events:none}
.cal-d .dots{display:flex;gap:2px;margin-top:1px}
.cal-d .dot{width:5px;height:5px;border-radius:50%}
/* Day detail modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;border-radius:2px;background:#ccc;margin:0 auto 16px}
/* Recap */
.recap-bar{display:flex;align-items:flex-end;gap:3px;height:100px;margin:10px 0}
.recap-col{flex:1;border-radius:6px 6px 0 0;transition:height .3s;position:relative}
.recap-col .label{position:absolute;bottom:-18px;font-size:9px;color:var(--t2);width:100%;text-align:center}

.scan-preview{width:100%;border-radius:10px;margin:10px 0;max-height:200px;object-fit:cover}
.scan-result{background:#f8f8fa;border-radius:10px;padding:12px;margin:8px 0}
.scan-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee;font-size:13px}
.scan-item:last-child{border-bottom:none}
.scan-edit{width:60px;padding:4px;border:1px solid var(--bd);border-radius:6px;text-align:center;font-size:13px;font-family:inherit}
/* Tips */
.tip{border-radius:10px;padding:11px 14px;margin:8px 0;font-size:12px;line-height:1.6}
.tip.gn{background:#e8f5e9}.tip.gn b{color:var(--gn)}
.tip.rd{background:#fce4ec}.tip.rd b{color:#c62828}
.tip.or{background:#fff3e0}.tip.or b{color:var(--or)}
.tip.bl{background:#e3f2fd}.tip.bl b{color:var(--bl)}
/* Spesa */
.sp-i{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #f5f5f5;cursor:pointer;user-select:none}
.sp-i:last-child{border-bottom:none}
.cb{width:22px;height:22px;border-radius:6px;border:2px solid #d1d1d6;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;font-weight:700;color:#fff;transition:all .15s}
.cb.on{background:var(--ok);border-color:var(--ok)}
.sp-t{font-size:13px;transition:all .15s}
.sp-t.on{color:#bbb;text-decoration:line-through}
.loading{text-align:center;padding:20px;color:var(--t2)}
.loading::after{content:'';display:inline-block;width:20px;height:20px;border:3px solid var(--bd);border-top-color:var(--dk);border-radius:50%;animation:spin 1s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
input[type="text"],input[type="number"],input[type="date"],textarea{font-family:inherit}
</style>
</head>

function calcTarget(w,sport){const bmr=calcBMR(w);const tdee=bmr*(sport?1.6:1.4);return Math.round(tdee-CFG.deficit)}
function getPortionMult(w){
  const base=calcTarget(76,false); // baseline at 76kg
  const curr=calcTarget(w,false);
  return curr/base; // ratio to adjust portions
}

function getWeek(){const s=new Date(S.startDate),n=new Date();return Math.min(8,Math.max(1,Math.floor((n-s)/(1000*60*60*24*7))+1))}
function getPhase(){const w=getWeek();return w<=3?1:w<=6?2:3}
function getDayType(d){return SCHED[(d||new Date()).getDay()]}
function fmtDate(ds){return new Date(ds+'T00:00:00').toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'})}

// Get daily calorie data for a date
function getDayCal(ds){
  const log=S.logs[ds]||{};
  const customs=S.customs[ds]||[];
  let total=0;
  Object.values(log).forEach(m=>{if(m.cal)total+=m.cal});
  customs.forEach(c=>total+=c.cal||0);
  return total;
}

// Food selection state
let foodSel={};let portions={};
function toggleFoodItem(mealId,ci,ii,multi){
  const key=mealId+'_'+ci+'_'+ii;
  const catKey=mealId+'_'+ci;
  if(!foodSel[mealId])foodSel[mealId]={};
  if(!multi){// single select per category - deselect others in same category
    Object.keys(foodSel[mealId]).forEach(k=>{if(k.startsWith(catKey+'_'))delete foodSel[mealId][k]});
  }
  if(foodSel[mealId][key])delete foodSel[mealId][key];
  else foodSel[mealId][key]={ci,ii};
  // Update UI
  document.querySelectorAll(`[id^="fi-${mealId}_${ci}_"]`).forEach(el=>el.classList.remove('sel'));
  Object.keys(foodSel[mealId]).forEach(k=>{const el=document.getElementById('fi-'+k);if(el)el.classList.add('sel')});
}
function setPortion(mealId,val){
  portions[mealId]=val;
  document.querySelectorAll(`#port-${mealId} button`).forEach(b=>b.classList.remove('on'));
  event.target.classList.add('on');
}
function saveMealLog(mealId){
  const sel=foodSel[mealId]||{};
  if(!Object.keys(sel).length){alert('Seleziona almeno un alimento!');return}
  const meal=MEALS.find(m=>m.id===mealId);
  const port=portions[mealId]||1;
  let items=[],totalCal=0;
  Object.values(sel).forEach(({ci,ii})=>{
    const item=meal.cats[ci].items[ii];
    const cal=(isSport&&item.calSport)?item.calSport:item.cal;
    items.push({n:item.n,cal:Math.round(cal*port)});
    totalCal+=Math.round(cal*port);
  });
  if(!S.logs[td()])S.logs[td()]={};
  S.logs[td()][mealId]={items,cal:totalCal,portion:port,sport:isSport};
  sv();foodSel[mealId]={};buildPasti();
}
function deleteMealLog(mealId){
  if(S.logs[td()]&&S.logs[td()][mealId]){delete S.logs[td()][mealId];sv();buildPasti()}
}
function deleteCustom(i){
  if(S.customs[td()])S.customs[td()].splice(i,1);sv();buildPasti();
}

async function processPhoto(input){
  if(!input.files[0])return;
  const file=input.files[0];
  const res=document.getElementById('scanResult');
  res.innerHTML='<div class="loading" style="margin-top:16px">Analizzo il pasto...</div>';

  const reader=new FileReader();
  reader.onload=async function(){
    const base64=reader.result.split(',')[1];
    const mediaType=file.type||'image/jpeg';
    try{
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,
          messages:[{role:'user',content:[
            {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
            {type:'text',text:'Analizza questo pasto. Rispondi SOLO con un JSON array di oggetti con "name" (nome piatto in italiano) e "cal" (calorie stimate). Esempio: [{"name":"Pasta al pomodoro","cal":550}]. Nessun altro testo.'}
          ]}]})
      });
      const data=await resp.json();
      const text=data.content[0].text.trim();
      const items=JSON.parse(text.replace(/```json|```/g,'').trim());
      showScanResults(items);
    }catch(e){
      res.innerHTML=`<div style="margin-top:12px;color:var(--ac);font-size:13px">Errore nell'analisi. Prova di nuovo o inserisci manualmente.</div>
        <button class="btn sec" style="margin-top:8px" onclick="closeModal();showCustomMeal()">Inserisci manualmente</button>`;
    }
  };
  reader.readAsDataURL(file);
}

function showScanResults(items){
  const res=document.getElementById('scanResult');
  let h=`<div style="margin-top:16px"><div style="font-weight:700;font-size:14px;margin-bottom:8px">Risultato — modifica se necessario:</div>`;

    h+=`<div class="scan-result"><div style="display:flex;justify-content:space-between;align-items:center">
      <input type="text" class="scan-name" value="${item.name}" style="flex:1;padding:6px;border:1px solid var(--bd);border-radius:6px;font-size:13px;margin-right:8px">

      <span style="font-size:11px;color:var(--t2);margin-left:4px">kcal</span></div></div>`;
  });
  h+=`<div style="margin-top:8px"><label style="display:flex;align-items:center;gap:8px;font-size:13px">
    <input type="checkbox" id="scanCheat"> 🍕 Cheat meal</label></div>

  res.innerHTML=h;
}

    const wp=wo.find(w=>w.ph===phase);
    const phCls=['','p1','p2','p3'][phase];
    const phLbl=['','Base (1-3)','Intermedio (4-6)','Intenso (7-8)'][phase];
    const done=wLog&&wLog.done;

    h+=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span class="phase-badge ${phCls}">Fase ${phase}: ${phLbl}</span>
        <span style="font-size:12px;color:var(--t2)">~30 min</span></div>
      <div style="font-weight:700;font-size:15px;margin-bottom:4px">${wp.name}</div>`;

    if(wp.circuit)h+=`<div style="font-size:12px;color:var(--or);font-weight:600;margin-bottom:10px">🔄 ${wp.rounds} giri — riposo ${wp.rest}s tra i giri</div>`;
    else h+=`<div style="font-size:12px;color:var(--t2);margin-bottom:10px">Riposo 45-60s tra le serie</div>`;

    wp.ex.forEach((ex,ei)=>{
      const logKey=dayType+'_'+phase+'_'+ei;
      const prevLog=findBestPrev(logKey);
      const target=ex.type==='sec'?ex.reps+'s':ex.reps+' rep';
      const setCount=wp.circuit?wp.rounds:ex.sets;

      h+=`<div class="ex"><div class="ex-n">${ex.n}</div>`;
      if(ex.d)h+=`<div class="ex-d">${ex.d}</div>`;
      h+=`<div class="ex-t">Target: ${ex.sets>1?ex.sets+' × ':''}${target}</div>`;

      // Show previous best if exists
      if(prevLog)h+=`<div style="font-size:11px;color:var(--gn);margin-top:2px">Record precedente: ${prevLog.join(', ')}</div>`;

      // Rep logging inputs
      h+=`<div class="ex-log">`;
      for(let s=0;s<setCount;s++){
        const val=(wLog&&wLog.sets&&wLog.sets[logKey])?wLog.sets[logKey][s]||'':'';
        h+=`<input type="number" id="wk-${logKey}-${s}" value="${val}" placeholder="${ex.type==='sec'?ex.reps:ex.reps}" 
          onchange="logExSet('${logKey}',${s},this.value,${setCount})">`;
        if(s<setCount-1)h+=`<span>·</span>`;
      }
      h+=`</div>`;

      // Progression hint
      if(prevLog&&prevLog.every(v=>v>=ex.reps)){
        h+=`<div class="progress-hint">💪 Superi il target costantemente! Prossima fase: aumenta rep o rallenta il tempo.</div>`;
      }
      h+=`</div>`;
    });

    h+=`<button class="btn${done?' ok':''}" onclick="finishWorkout('${dayType}',${phase})">${done?'✓ Completato — modifica':'Salva allenamento ✓'}</button></div>`;
  }

  // Weekly schedule
  h+=`<div class="card"><div style="font-weight:700;font-size:14px;margin-bottom:8px">📅 Settimana tipo</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center">
    ${['Lun','Mar','Mer','Gio','Ven','Sab','Dom'].map((d,i)=>{
      const labels=['💪Push','⚽Sport','💪Pull','😴Rip','💪Mix','⚽Sport','😴Rip'];
      const today=new Date().getDay();const dayIdx=(i+1)%7;
      return `<div style="padding:6px 2px;border-radius:8px;font-size:10px;${dayIdx===today?'background:var(--dk);color:#fff':'color:var(--t2)'}"><div style="font-weight:700">${d}</div><div style="margin-top:2px">${labels[i]}</div></div>`;
    }).join('')}</div></div>`;

  h+=`<div class="card"><div style="font-weight:700;font-size:13px;margin-bottom:4px">💊 Creatina</div>
  <div style="font-size:12px;color:var(--t2)">5g al giorno con il pranzo. Trattiene ~1-1.5kg acqua nei muscoli.</div></div>`;

  c.innerHTML=h;
}

function logExSet(logKey,setIdx,val,totalSets){
  if(!S.wkLogs[td()])S.wkLogs[td()]={sets:{},done:false};
  if(!S.wkLogs[td()].sets[logKey])S.wkLogs[td()].sets[logKey]=[];
  S.wkLogs[td()].sets[logKey][setIdx]=parseInt(val)||0;
  sv();
}
function finishWorkout(dayType,phase){
  if(!S.wkLogs[td()])S.wkLogs[td()]={sets:{},done:false};
  S.wkLogs[td()].done=!S.wkLogs[td()].done;
  S.wkLogs[td()].type=dayType;S.wkLogs[td()].phase=phase;
  sv();buildWorkout();
}
function findBestPrev(logKey){
  const dates=Object.keys(S.wkLogs).filter(d=>d!==td()&&S.wkLogs[d].sets&&S.wkLogs[d].sets[logKey]);
  if(!dates.length)return null;
  const last=dates.sort().pop();
  return S.wkLogs[last].sets[logKey];
}

// ========== STORICO TAB ==========
let calM=new Date().getMonth(),calY=new Date().getFullYear();
function renderStorico(){
  const c=document.getElementById('tab-storico');
  const months=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const w=currentWeight();const tgt=calcTarget(w,false);

  // Weekly recap
  const now=new Date();const mon=new Date(now);mon.setDate(now.getDate()-((now.getDay()+6)%7));
  let weekCals=[],weekMeals=0,weekWk=0,weekCheat=0,weekDays=0;
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    const ds=d.toISOString().slice(0,10);
    if(ds>td())break;
    weekDays++;
    const dc=getDayCal(ds);if(dc>0)weekCals.push(dc);
    const dl=S.logs[ds];if(dl)weekMeals+=Object.keys(dl).length;
    if(S.wkLogs[ds]&&S.wkLogs[ds].done)weekWk++;
    const cust=S.customs[ds]||[];weekCheat+=cust.filter(c=>c.cheat).length;
  }
  const avgCal=weekCals.length?Math.round(weekCals.reduce((a,b)=>a+b,0)/weekCals.length):0;

  let h=`<div class="card"><div style="font-weight:700;font-size:15px;margin-bottom:10px">📊 Recap settimana</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div style="background:#f8f8fa;border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:20px;font-weight:800;color:${avgCal&&avgCal<=tgt+100?'var(--gn)':'var(--or)'}">${avgCal||'—'}</div>
        <div style="font-size:11px;color:var(--t2)">kcal media/giorno</div></div>
      <div style="background:#f8f8fa;border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:20px;font-weight:800">${weekWk}/3</div>
        <div style="font-size:11px;color:var(--t2)">workout fatti</div></div>
      <div style="background:#f8f8fa;border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:20px;font-weight:800">${weekMeals}</div>
        <div style="font-size:11px;color:var(--t2)">pasti loggati</div></div>
      <div style="background:#f8f8fa;border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:20px;font-weight:800">${weekCheat}</div>
        <div style="font-size:11px;color:var(--t2)">cheat meals</div></div>
    </div>
    ${weekCals.length>=3?`<div style="margin-top:10px;font-size:12px;color:var(--t2)">
      <b>Target:</b> ~${tgt} kcal/giorno · <b>Media:</b> ${avgCal} kcal · <b>Differenza:</b> ${avgCal-tgt>0?'+':''}${avgCal-tgt} kcal</div>`:
      `<div style="margin-top:8px;font-size:12px;color:var(--t2);font-style:italic">Logga almeno 3 giorni per vedere il recap completo</div>`}
  </div>`;

  // Calendar
  h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <button style="background:none;border:none;font-size:18px;cursor:pointer;padding:4px 10px" onclick="calM--;if(calM<0){calM=11;calY--}renderStorico()">‹</button>
    <span style="font-weight:700;font-size:15px">${months[calM]} ${calY}</span>
    <button style="background:none;border:none;font-size:18px;cursor:pointer;padding:4px 10px" onclick="calM++;if(calM>11){calM=0;calY++}renderStorico()">›</button></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px;font-size:11px;color:var(--t2)">
      <span>🟢 Pasti</span><span>🔵 Workout</span><span>🟠 Sport</span><span>🔴 Peso</span></div>
    <div class="cal-grid">${['L','M','M','G','V','S','D'].map(d=>`<div class="cal-hd">${d}</div>`).join('')}`;

  const first=new Date(calY,calM,1);const start=(first.getDay()+6)%7;
  const days=new Date(calY,calM+1,0).getDate();
  for(let i=0;i<start;i++)h+='<div class="cal-d empty"></div>';
  for(let d=1;d<=days;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ds===td();
    const ml=S.logs[ds]?Object.keys(S.logs[ds]).length:0;
    const wk=S.wkLogs[ds]&&S.wkLogs[ds].done;
    const wt=S.weights.find(w=>w.date===ds);
    const dw=new Date(calY,calM,d).getDay();const isSp=dw===2||dw===6;
    let dots='<div class="dots">';
    if(ml)dots+='<div class="dot" style="background:var(--ok)"></div>';
    if(wk)dots+='<div class="dot" style="background:var(--bl)"></div>';
    if(isSp&&ml)dots+='<div class="dot" style="background:var(--or)"></div>';
    if(wt)dots+='<div class="dot" style="background:var(--ac)"></div>';
    dots+='</div>';
    h+=`<div class="cal-d${isT?' today':''}" onclick="showDayDetail('${ds}')">${d}${dots}</div>`;
  }
  h+='</div></div>';

  // Weight
  h+=`<div class="card"><div style="font-weight:700;font-size:15px;margin-bottom:8px">⚖️ Peso</div>
    <div style="font-size:12px;color:var(--t2);margin-bottom:10px">Pesati ogni lunedì a digiuno. Creatina = +1-1.5kg acqua (non è grasso).</div>
    <div style="display:flex;gap:8px"><input type="number" step="0.1" placeholder="es. 75.2" id="pinp" style="flex:1;padding:10px;border:1px solid var(--bd);border-radius:8px;font-size:16px;font-family:inherit">
    <button class="btn sm" style="padding:10px 16px" onclick="addW()">Salva</button></div></div>`;

  if(S.weights.length){
    const trend=S.weights.length>=2?S.weights[S.weights.length-1].kg-S.weights[0].kg:null;
    h+='<div class="card"><div style="font-weight:700;font-size:14px;margin-bottom:8px">Trend peso</div>';
    if(trend!==null){
      const newTgt=calcTarget(currentWeight(),false);
      h+=`<div style="border-radius:8px;padding:10px;margin-bottom:8px;font-size:13px;font-weight:700;${trend<=0?'background:#e8f5e9;color:var(--gn)':'background:#fff3e0;color:var(--or)'}">
        ${trend>0?'+':''}${trend.toFixed(1)} kg dall'inizio · Target attuale: ~${newTgt} kcal</div>`;
    }
    S.weights.slice(-8).reverse().forEach(w=>{
      const lbl=new Date(w.date+'T00:00:00').toLocaleDateString('it-IT',{weekday:'short',day:'numeric',month:'short'});
      h+=`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0f0f0;font-size:13px"><span>${lbl}</span><span style="font-weight:700">${w.kg.toFixed(1)} kg</span></div>`;
    });
    h+='</div>';
  }

  // Settings
  h+=`<div class="card"><div style="font-weight:700;font-size:14px;margin-bottom:6px">⚙️ Impostazioni</div>
    <div style="font-size:12px;color:var(--t2);margin-bottom:6px">Data inizio programma</div>
    <input type="date" value="${S.startDate}" onchange="S.startDate=this.value;sv();updateHeader();renderStorico()" style="width:100%;padding:8px;border:1px solid var(--bd);border-radius:8px;font-size:14px;font-family:inherit">
    <div style="font-size:12px;color:var(--t2);margin:8px 0 6px">API Key (per scansione foto)</div>
    <input type="text" value="${S.apiKey||''}" placeholder="sk-ant-..." onchange="S.apiKey=this.value.trim();sv()" style="width:100%;padding:8px;border:1px solid var(--bd);border-radius:8px;font-size:13px;font-family:inherit">
    <div style="font-size:12px;color:var(--t2);margin:8px 0 6px">🔔 Promemoria spuntini</div>
    <button class="btn sec" onclick="setupNotif()">Attiva notifiche (10:30 e 16:00)</button>
  </div>`;

  c.innerHTML=h;
}

function addW(){
  const inp=document.getElementById('pinp');
  const v=parseFloat(inp.value.replace(',','.'));
  if(isNaN(v)||v<40||v>200)return;
  S.weights=S.weights.filter(w=>w.date!==td());
  S.weights.push({date:td(),kg:v});
  S.weights.sort((a,b)=>a.date.localeCompare(b.date));
  sv();inp.value='';updateHeader();renderStorico();buildPasti();
}

function showDayDetail(ds){
  const log=S.logs[ds]||{};
  const cust=S.customs[ds]||[];
  const wk=S.wkLogs[ds];
  const wt=S.weights.find(w=>w.date===ds);
  const totalCal=getDayCal(ds);
  const dateStr=fmtDate(ds);

  let h=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-handle"></div>
    <div style="font-weight:700;font-size:16px;margin-bottom:4px">${dateStr}</div>
    <div style="font-size:13px;color:var(--t2);margin-bottom:12px">${totalCal?'Totale: ~'+totalCal+' kcal':'Nessun dato calorie'}</div>`;

  // Meals logged
  const mealIds=Object.keys(log);
  if(mealIds.length){
    h+=`<div style="font-weight:700;font-size:13px;margin-bottom:6px">🍽️ Pasti dalla guida</div>`;
    mealIds.forEach(id=>{
      const m=log[id];const meal=MEALS.find(ml=>ml.id===id);
      h+=`<div style="background:#f8f8fa;border-radius:8px;padding:10px;margin-bottom:6px">
        <div style="font-weight:600;font-size:13px">${meal?meal.icon+' '+meal.name:id}</div>
        <div style="font-size:12px;color:#555;margin-top:2px">${m.items?m.items.map(i=>i.n).join(', '):'—'}</div>
        <div style="font-size:12px;font-weight:700;color:var(--bl);margin-top:2px">~${m.cal} kcal${m.portion&&m.portion!==1?' (porzione '+(m.portion<1?'½':'abbondante')+')':''}</div></div>`;
    });
  }

  // Custom meals
  if(cust.length){
    h+=`<div style="font-weight:700;font-size:13px;margin:8px 0 6px">🍽️ Pasti custom</div>`;
    cust.forEach(cm=>{
      h+=`<div style="background:#f8f8fa;border-radius:8px;padding:10px;margin-bottom:6px">
        <div style="font-weight:600;font-size:13px">${cm.name}${cm.cheat?' 🍕':''}</div>
        <div style="font-size:12px;font-weight:700;color:var(--bl)">~${cm.cal} kcal · ${cm.time||''}</div></div>`;
    });
  }

  // Workout
  if(wk){
    h+=`<div style="font-weight:700;font-size:13px;margin:8px 0 6px">💪 Workout${wk.done?' ✅':''}</div>`;
    if(wk.sets){
      const keys=Object.keys(wk.sets);
      keys.forEach(k=>{
        const parts=k.split('_');const type=parts[0];const phase=parts[1];const ei=parts[2];
        const wo=WK[type];if(!wo)return;
        const wp=wo.find(w=>w.ph==phase);if(!wp)return;
        const ex=wp.ex[ei];if(!ex)return;
        h+=`<div style="font-size:12px;padding:3px 0"><b>${ex.n}:</b> ${wk.sets[k].join(', ')} ${ex.type==='sec'?'s':'rep'}</div>`;
      });
    }
  }

  // Weight
  if(wt)h+=`<div style="font-weight:700;font-size:13px;margin:8px 0 6px">⚖️ Peso: ${wt.kg.toFixed(1)} kg</div>`;

  if(!mealIds.length&&!cust.length&&!wk&&!wt)h+=`<div style="font-size:13px;color:var(--t2);text-align:center;padding:20px">Nessuna attività registrata</div>`;

  h+=`<button class="btn sec" style="margin-top:12px" onclick="closeModal()">Chiudi</button></div></div>`;
  document.getElementById('modalRoot').innerHTML=h;
}

// ========== NOTIFICATIONS ==========
async function setupNotif(){
  if(!('Notification' in window)){alert('Browser non supportato. Imposta 2 sveglie: 10:30 e 16:00');return}
  const p=await Notification.requestPermission();
  if(p==='granted'){
    localStorage.setItem('chad-notif','on');scheduleNotifs();
    alert('Notifiche attivate!');
  }else alert('Non permesse. Imposta 2 sveglie: 10:30 e 16:00');
}
function scheduleNotifs(){
  if(window._ni)clearInterval(window._ni);
  window._ni=setInterval(()=>{
    const n=new Date(),h=n.getHours(),m=n.getMinutes();
    if(h===10&&m===30)new Notification('Chad 💪',{body:'Spuntino mattina! 🥜'});
    if(h===16&&m===0)new Notification('Chad 💪',{body:'Spuntino pomeriggio! 🍫'});
    if(h===6&&m===0)new Notification('Chad 💪',{body:'Sveglia! Banana e allenamento 🍌'});
  },60000);
}

// ========== SPESA TAB ==========
function buildSpesa(){
  const c=document.getElementById('tab-spesa');
  const ck=JSON.parse(localStorage.getItem('chad-sp2')||'{}');
  let h='<div style="font-size:13px;color:#888;margin-bottom:12px;font-style:italic">Tocca per segnare cosa hai comprato.</div>';
  SPESA.forEach((sec,si)=>{
    h+=`<div class="card"><div style="font-weight:700;font-size:14px;margin-bottom:8px">${sec.cat}</div>`;
    sec.items.forEach((item,ii)=>{const k=si+'_'+ii;const on=ck[k]?' on':'';
      h+=`<div class="sp-i" onclick="tSp('${k}',this)"><div class="cb${on}">${ck[k]?'✓':''}</div><span class="sp-t${on}">${item}</span></div>`;});
    h+='</div>';});
  h+=`<button class="btn sec" style="color:var(--ac);border-color:var(--ac)" onclick="if(confirm('Reset?')){localStorage.removeItem('chad-sp2');buildSpesa()}">🗑️ Reset</button>`;
  c.innerHTML=h;
}
function tSp(k,el){
  const cb=el.querySelector('.cb'),st=el.querySelector('.sp-t');const on=cb.classList.contains('on');
  cb.classList.toggle('on',!on);cb.textContent=!on?'✓':'';st.classList.toggle('on',!on);
  const d=JSON.parse(localStorage.getItem('chad-sp2')||'{}');d[k]=!on;localStorage.setItem('chad-sp2',JSON.stringify(d));
}

}

// ========== SERVICE WORKER ==========
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
if(localStorage.getItem('chad-notif')==='on'&&typeof Notification!=='undefined'&&Notification.permission==='granted')scheduleNotifs();

// ========== INIT ==========
buildTabs();updateHeader();buildPasti();buildWorkout();buildSpesa();renderStorico();buildRegole();
</script>
